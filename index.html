    <link rel="icon" type="image/png" href="%BASE_URL%favicon.png?v=ks1" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin="anonymous"
    />
    <!--
      Same stylesheet, same URL, same final fonts — only the loading
      strategy changes. A plain <link rel="stylesheet"> to a cross-origin
      host blocks CSSOM construction (and therefore first paint) on a
      network round trip. Loading it as a non-blocking "preload" and
      swapping its rel to "stylesheet" once fetched (the standard
      loadCSS-free pattern) lets the page paint immediately with fallback
      fonts and swap to the webfonts a moment later. <noscript> keeps this
      identical (render-blocking) for the no-JS case.
    -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Anton&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600;700;800&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Anton&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600;700;800&display=swap"
      />
    </noscript>

    <!--
      LCP-critical: the hero's first character image (the "Full-Stack
      AI Developer" slide, always active on mount). It's a same-origin
      local asset now (public/images/hero/), so no preconnect is
      needed — just start the fetch itself as early as possible,
      before React has even mounted. `imagesrcset`/`imagesizes` mirror
      the <picture>'s AVIF <source> in Hero.tsx so the browser
      preloads the same responsive candidate it will actually use
      instead of guessing.
    -->
    <link
      rel="preload"
      as="image"
      imagesrcset="%BASE_URL%images/hero/full-stack-ai-developer-480w.avif 480w, %BASE_URL%images/hero/full-stack-ai-developer-900w.avif 900w, %BASE_URL%images/hero/full-stack-ai-developer-1350w.avif 1350w, %BASE_URL%images/hero/full-stack-ai-developer-1800w.avif 1800w"
      imagesizes="(max-width: 640px) 60vw, 45vw"
      type="image/avif"
    />
  </head>
